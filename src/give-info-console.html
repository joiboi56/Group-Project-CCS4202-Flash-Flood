<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Call - Report Field Data</title>
    <style>
        :root {
            --bg-color: #0b0f17;
            --card-bg: #121824;
            --border-color: #1f2a3c;
            --text-main: #f0f6fc;
            --text-muted: #7d8b9e;
            --accent-orange: #f27420;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .form-container {
            max-width: 650px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 5px;
        }

        h2 {
            font-size: 1.5rem;
            margin: 0;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .back-btn:hover {
            border-color: var(--accent-orange);
            color: var(--text-main);
        }

        .desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 12px;
            background-color: #070a10;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-orange);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            background-color: var(--accent-orange);
            color: #ffffff;
            border: none;
            padding: 14px 20px;
            font-weight: bold;
            font-size: 0.95rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-row">
        <h2>Report Field Parameters & Supply Matrix</h2>
        <a href="UserInterface.html" class="back-btn">← Portal</a>
    </div>
    <p class="desc">Input real-time environmental values to evaluate edge variables dynamically against system optimization objectives.</p>

    <form action="/api/field-report" method="POST">

        <div class="form-group">
            <label for="location-select">Target Crisis Node (v ∈ V)</label>
            <select id="location-select" name="nodeTarget">
                <option value="SKS">SK Sri Serdang (Critical)</option>
                <option value="SMK">SMK Sri Serdang (High)</option>
                <option value="U360">Univ360 (Moderate)</option>
                <option value="KTMB">KTMB Serdang Station (High)</option>
                <option value="SGR">SMK Sungai Ramal (Critical)</option>
                <option value="MRB">SK Sg Merab (High)</option>
            </select>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label for="depth-input">Current Node Flood Depth d(n) (mm)</label>
                <input id="depth-input" name="floodDepth" type="number" placeholder="e.g. 250" min="0">
            </div>
            <div class="form-group">
                <label for="edge-weight-input">Baseline Travel Cost w(u,v) (mins)</label>
                <input id="edge-weight-input" name="baseWeight" type="number" placeholder="e.g. 15" min="1">
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label for="supply-category-select">Supply Item Selection (i ∈ I)</label>
                <select id="supply-category-select" name="itemCategory">
                    <option value="medical">Insulin & medical kits</option>
                    <option value="formula">Infant formula & diapers</option>
                    <option value="hygiene">Hygiene kits</option>
                    <option value="rations">Food rations (MRE)</option>
                    <option value="clothing">Blankets & dry clothing</option>
                </select>
            </div>
            <div class="form-group">
                <label for="weight-input">Total Available Item Mass w(i) (kg)</label>
                <input id="weight-input" name="itemWeight" type="number" placeholder="e.g. 450.0" step="0.1" min="0">
            </div>
        </div>

        <div class="form-group">
            <label for="priority-score-input">Target Survival Score Metrics Value v(i)</label>
            <input id="priority-score-input" name="priorityValue" type="number" placeholder="e.g. 2100" min="0">
        </div>

        <div class="form-group">
            <label for="notes-textarea">Field Condition Reports</label>
            <textarea id="notes-textarea" name="fieldNotes" rows="4" placeholder="Document specific infrastructure details to support centralized dispatcher decision making..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Transmit Parameters to Backend</button>
    </form>
</div>

</body>
</html>
